workflows:
  ios-dev:
    name: iOS Development Build
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      flutter: stable
    scripts:
      - name: Get dependencies
        script: flutter pub get

      - name: Enable iOS
        script: flutter config --enable-ios

      - name: Regenerate iOS project
        script: |
          rm -rf ios/
          flutter create --platforms=ios .

      - name: Install pods
        script: |
          cd ios
          pod install

      - name: Build unsigned iOS app
        script: |
          cd ios
          xcodebuild \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Debug \
            -sdk iphoneos \
            -derivedDataPath ../build/ios/derivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            clean build

      - name: Package .ipa
        script: |
          APP_PATH=$(find build/ios/derivedData -name "Runner.app" -path "*/Debug-iphoneos/*" | head -1)
          mkdir -p build/ios/ipa/Payload
          cp -r "$APP_PATH" build/ios/ipa/Payload/Runner.app
          cd build/ios/ipa
          zip -r InflaBasket.ipa Payload
          rm -rf Payload

    artifacts:
      - build/ios/ipa/InflaBasket.ipa
