workflows:
  ios-dev:
    name: iOS Development Build
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      flutter: stable
    scripts:
      - name: Get dependencies
        script: flutter pub get

      - name: Run code generation
        script: dart run build_runner build -d

      - name: Generate iOS project
        script: |
          rm -rf ios/
          flutter create --platforms=ios .

      - name: Patch Podfile deployment target
        script: |
          # Ensure platform is set to 12.0 before pod install
          if [ -f ios/Podfile ]; then
            sed -i '' "s/platform :ios, '[0-9.]*'/platform :ios, '12.0'/" ios/Podfile || true
            sed -i '' 's/platform :ios, "[0-9.]*"/platform :ios, "12.0"/' ios/Podfile || true
          fi

      - name: Install pods
        script: |
          cd ios
          pod install --repo-update

      - name: Build unsigned iOS app
        script: |
          flutter build ipa \
            --release \
            --no-codesign

      - name: Locate and rename artifact
        script: |
          IPA_PATH=$(find build/ios/ipa -name "*.ipa" | head -1)
          mkdir -p build/ios/output
          cp "$IPA_PATH" build/ios/output/InflaBasket.ipa

    artifacts:
      - build/ios/output/InflaBasket.ipa
